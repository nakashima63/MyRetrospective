services:
  db:
    image: postgres:16-alpine
    container_name: myretro-db
    environment:
      POSTGRES_DB: myretro
      POSTGRES_USER: myretro
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myretro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
