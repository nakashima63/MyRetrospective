services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: myretro-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: myretro-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/myretro
      SPRING_DATASOURCE_USERNAME: myretro
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: myretro-db
    environment:
      POSTGRES_DB: myretro
      POSTGRES_USER: myretro
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myretro"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
