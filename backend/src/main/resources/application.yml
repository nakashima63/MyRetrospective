spring:
  application:
    name: myretro-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/myretro}
    username: ${SPRING_DATASOURCE_USERNAME:myretro}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:dev-secret-key-at-least-256-bits-long-for-hmac-sha256}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

server:
  port: 8080
