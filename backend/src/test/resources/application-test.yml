spring:
  datasource:
    url: jdbc:h2:mem:myretro-test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false

jwt:
  secret: test-secret-key-at-least-256-bits-long-for-hmac-sha256-testing
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
